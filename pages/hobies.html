<body>

        <section class="hobbies-section">
            <div class="hobby-image-wrap">
                <img src="../images/sports/QC7A8545.jpg" alt="Playing volleyball" class="hobby-photo" id="hobby-photo">
                <button type="button" class="hobby-arrow" id="hobby-arrow" aria-label="Show next image">&#8594;</button>
            </div>
            <div class="hobby-text is-blurry" id="hobby-text">
                <h2>Sports</h2>
                <p>I enjoy volleyball and other activities that keep me active, focused, and connected with other people.</p>
            </div>
        </section>
        <section>lower section</section>
        <footer> footer</footer>

        <script>
            const hobbyPhoto = document.getElementById("hobby-photo");
            const hobbyText = document.getElementById("hobby-text");
            const hobbyArrow = document.getElementById("hobby-arrow");
            const hobbyImages = [
                "../images/sports/QC7A8545.jpg",
                "../images/sports/QC7A6976.jpg",
                "../images/sports/DSC_0193.JPG"
            ];
            let hobbyImageIndex = 0;

            hobbyPhoto.addEventListener("click", function () {
                hobbyText.classList.remove("is-blurry");
            });

            hobbyArrow.addEventListener("click", function () {
                hobbyImageIndex = (hobbyImageIndex + 1) % hobbyImages.length;
                hobbyPhoto.src = hobbyImages[hobbyImageIndex];
            });
        </script>

</body>
